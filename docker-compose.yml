# DistribuFlow — local infrastructure (no Azure).
# In production these map to: SQL Server -> Azure SQL, Redis -> Azure Cache for Redis,
# the in-process bus -> Azure Service Bus. Elasticsearch stays Elasticsearch.
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: distribuflow-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Your_strong_Pass123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"Your_strong_Pass123\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    container_name: distribuflow-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false      # demo only — never disable in prod
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: distribuflow-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Optional UI to inspect the Elasticsearch index during a demo.
  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.0
    container_name: distribuflow-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
